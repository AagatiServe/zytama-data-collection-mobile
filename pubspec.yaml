name: zytama_data
description: "Zytama product data collection app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Networking
  dio: ^5.8.0+1

  # Local storage
  shared_preferences: ^2.3.2

  # Dependency injection
  get_it: ^8.0.3

  # Camera & image capture
  image_picker: ^1.1.2
  camera: ^0.11.0

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # UI
  google_fonts: ^8.0.2
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1

  # Permissions
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png
    - assets/svg/
    - assets/images/
